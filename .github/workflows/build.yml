name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyside6

      - name: Build with PyInstaller
        run: pyinstaller build.spec --clean --distpath dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamManfiesto-${{ runner.os }}
          path: dist/SteamManfiesto*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SteamManfiesto-Linux/SteamManfiesto
            SteamManfiesto-Windows/SteamManfiesto.exe
          body: |
            ## SteamManfiesto ${{ github.ref_name }}

            ### Downloads
            - **Linux**: `SteamManfiesto` — chmod +x and run
            - **Windows**: `SteamManfiesto.exe` — double-click to run
          generate_release_notes: true
