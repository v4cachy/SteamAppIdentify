name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyside6

      - name: Build with PyInstaller
        run: pyinstaller build.spec --clean --distpath dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppIDentify-Linux
          path: dist/AppIDentify

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyside6

      - name: Build with PyInstaller
        run: pyinstaller build.spec --clean --distpath dist

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --confirm
        shell: powershell

      - name: Build Installer
        shell: cmd
        run: |
          set VERSION=%GITHUB_REF_NAME:v=%
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DMyAppVersion=%VERSION% installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppIDentify-Windows
          path: |
            dist/AppIDentify.exe
            dist/AppIDentify-Setup-*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List files
        run: find . -type f -name "AppIDentify*" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AppIDentify-Linux/AppIDentify
            AppIDentify-Windows/AppIDentify.exe
            AppIDentify-Windows/AppIDentify-Setup-*.exe
          body: |
            ## AppIDentify ${{ github.ref_name }}

            ### Downloads
            | File | Platform | How to use |
            |------|----------|-----------|
            | `AppIDentify-Setup-*.exe` | **Windows Installer** | Run it — installs to Program Files, creates shortcuts |
            | `AppIDentify.exe` | **Windows Portable** | Double-click, no install needed |
            | `AppIDentify` | **Linux** | `chmod +x` then run |

            ### For Windows users (recommended)
            Download the **Installer** — it adds a Start Menu entry, desktop shortcut, and uninstall support.
          generate_release_notes: true
